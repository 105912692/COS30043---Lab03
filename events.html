<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event Information (Searchable Table)">
    <meta name="author" content="Oliver Scott">
    <title>Event Information (Searchable Table)</title>
    <link rel="stylesheet" href="styles/styles.css">  <!-- Link to your custom CSS file -->
    <script defer src="scripts/scripts.js"></script> <!-- Link to your custom JavaScript file -->
    <!-- Include Bootstrap CSS from CDN (Not recommended for production)-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Include Vue.js from CDN (Not recommended for production)-->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <div class="col-12">
                <h1 class="grid-demo">Event Information</h1>
            </div>
        </div>
    </header>
    
    <main>
        <div id="app" class="container">
            <div class="d-flex flex-wrap align-items-center mb-3">
                <div class="d-flex align-items-center me-3 mb-2">
                    <label for="eID" class="me-2">Event ID</label>
                    <input type="text" id="eID" v-model="eventObj.eID" class="form-control" style="width: 150px;"/>
                </div>
                <div class="d-flex align-items-center me-3 mb-2">
                    <label for="eName" class="me-2">Event Name</label>
                    <input type="text" id="eName" v-model="eventObj.eName" class="form-control" style="width: 200px;"/>
                </div>
                <div class="d-flex align-items-center mb-2">
                    <label for="eDur" class="me-2">Duration</label>
                    <input type="text" id="eDur" v-model="eventObj.eDur" class="form-control" style="width: 150px;"/>
                </div>
            </div>
            <div>
                <label>Category</label><br>
                <input type="radio" id="business" v-model="eventObj.category" value="business">
                <label for="business">Business</label><br>
                <input type="radio" id="technology" v-model="eventObj.category" value="technology">
                <label for="technology">Technology</label><br>
                <input type="radio" id="finance" v-model="eventObj.category" value="finance">
                <label for="finance">Finance</label><br>
                <input type="radio" id="marketing" v-model="eventObj.category" value="marketing">
                <label for="marketing">Marketing</label><br>
                <input type="radio" id="all" v-model="eventObj.category" value="all">
                <label for="all">All</label><br>
            </div>
            <div class="row">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <tr>
                            <th>Event ID</th>
                            <th>Event Name</th>
                            <th>Event Category</th>
                            <th>Duration Hour</th>
                        </tr>
                        <tr v-for="m in filterMarks">
                            <td>{{m.eID}}</td>
                            <td>{{m.eName}}</td>
                            <td>{{m.category}}</td>
                            <td>{{m.eDur}}</td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <div class="col-12">
                <p class="grid-demo">&copy; 2025 Oliver Scott. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
